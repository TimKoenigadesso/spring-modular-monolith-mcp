# ── Cloud Run Profile ─────────────────────────────────────────────────────────
# Postgres via sidecar (localhost) or env-override
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookstore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bookstore}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bookstore}

# Hikari: don't crash on startup if Postgres sidecar is still initializing
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000

# Flyway: retry until Postgres is ready
spring.flyway.connect-retries=20
spring.flyway.connect-retries-interval=3s

# Disable RabbitMQ — not needed for MCP demo
# Internal Spring Modulith events run via JDBC event journal (no RabbitMQ)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# OpenTelemetry disabled (no Grafana sidecar)
management.otlp.tracing.export.enabled=false
management.otlp.metrics.export.enabled=false
management.otlp.logging.export.enabled=false

# Server
server.port=${PORT:8080}
server.tomcat.max-threads=50
